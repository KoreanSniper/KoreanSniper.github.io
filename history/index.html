<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History Browser</title>
  <link rel="stylesheet" href="../community/css/discord.css">
  <style>
    .history-shell {
      width: min(100%, 980px);
      margin: 0 auto;
      padding: 24px;
    }

    .history-intro {
      margin-bottom: 18px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .history-entry {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(17, 23, 35, 0.72);
      color: #fff;
      text-decoration: none;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .history-entry:hover {
      transform: translateY(-1px);
      background: rgba(27, 33, 46, 0.92);
    }

    .history-entry strong {
      display: block;
      margin-bottom: 4px;
    }

    .history-entry span {
      color: #a4afc1;
      font-size: 13px;
    }

    .history-index {
      color: #b9c2ff;
      font-weight: 800;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="history-shell">
    <section class="card home-card">
      <p class="eyebrow">BlockRail History</p>
      <h1>기록 브라우저</h1>
      <p class="home-copy history-intro">
        이곳에서 이전 버전의 페이지를 살펴볼 수 있습니다.
        번호가 클수록 더 최근에 가까운 버전입니다.
      </p>

      <div class="home-actions">
        <a class="download-link" href="../index.html">홈으로</a>
        <a class="download-link" href="../lobby.html">로비</a>
      </div>

      <div id="list" class="history-list"></div>
    </section>
  </div>

  <script>
    const commitsRaw = [
    "초기 커밋",
    "index.html 초기 HTML 구조 추가",
    "지하철 지도 웹 앱 추가",
    "지하철 지도 스타일 추가",
    "지하철 지도 데이터 추가",
    "지하철 지도 앱 로직 추가",
    "사이트 루트에 지하철 지도 배포",
    "사이트 루트에 지하철 지도 데이터 배포",
    "사이트 루트에 지하철 지도 앱 로직 배포",
    "모바일 터치 지원 지하철 지도 추가",
    "모바일 터치 지원 지하철 지도 스타일 추가",
    "모바일 터치 지원 지하철 지도 데이터 추가",
    "모바일 터치 지원 지하철 지도 앱 로직 추가",
    "koreansniper.github.io/Subway-map-touch -> koreansniper.github.io, 9호선 완공",
    "9호선 계획 버그 수정",
    "경로 검색이 안 되는 버그 수정",
    "경로 강조 기능 추가, 노선 예정 안내에 9호선이 남아있던 버그 수정",
    "사이드바 버그 수정",
    "10, 12호선 계획 추가",
    "10, 12호선 계획 백지화 및 10~12호선 계획 추가, 팔경선 계획 추가",
    "팔경선 개통",
    "역 위치 수정",
    "노선 이름 수정",
    "1차 행정구역 업데이트",
    "2차 행정구역 업데이트",
    "10호선 개통",
    "11호선 개통",
    "WDX 노선 수정",
    "사이트 구조 변경",
    "URL 구조를 깔끔하게 변경",
    "버그 수정",
    "사이트 개선",
    "WDX 개통",
    "역 이름 업데이트",
    "서산순환산 계획 추가",
    "1차 역 버그 수정",
    "2차 역 버그 수정",
    "3차 역 버그 수정",
    "4차 역 버그 수정",
    "5차 역 버그 수정",
    "역 버그 수정 완료",
    "노선 추가 계획 수립, WDX 폐선 예정",
    "UI 업데이트",
    "커뮤니티 업데이트",
    "편의성 업데이트",
    "서산순환선,서산1호선 개통,WDX 폐선",
    "서산2호선,서산3호선 개통",
    "미니게임 추가, UI 변경"
    ];

    const list = document.getElementById("list");

    commitsRaw
      .map((msg, idx) => ({ msg, index: idx + 1 }))
      .reverse()
      .forEach(item => {
        const a = document.createElement("a");
        a.className = "history-entry";
        a.href = `${String(item.index).padStart(3, "0")}/`;
        a.innerHTML = `
          <div>
            <strong>v${String(item.index).padStart(3, "0")}</strong>
            <span>${item.msg}</span>
          </div>
          <div class="history-index">열기</div>
        `;
        list.appendChild(a);
      });
  </script>
</body>
</html>
