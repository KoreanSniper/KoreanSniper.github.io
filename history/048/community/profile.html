<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>프로필</title>
  <link rel="stylesheet" href="css/discord.css">
</head>
<body class="app">
  <div class="layout">
    <aside class="sidebar">
      <section class="panel">
        <h2 class="logo"><a class="logo-link" href="../index.html">BlockRail</a></h2>
        <p class="panel-hint">내 계정 정보와 상태 메시지, 작성한 글을 확인하는 화면입니다.</p>
      </section>

      <section class="panel">
        <h2>바로 가기</h2>
        <div class="filter-list">
          <button class="download-link" onclick="goHome()">커뮤니티 홈</button>
          <button class="download-link" onclick="logout()">로그아웃</button>
          <a class="download-link" href="./my-posts.html">내 글 보기</a>
        </div>
      </section>
    </aside>

    <main class="main">
      <section class="card profile-card">
        <p class="eyebrow">BlockRail Community</p>
        <h1>내 프로필</h1>
        <p class="home-copy">이메일, 닉네임, 상태 메시지, 작성 글을 한 번에 확인할 수 있습니다.</p>

        <div class="hub-grid">
          <article class="launch-card">
            <span class="launch-kicker">이메일</span>
            <strong id="email">-</strong>
            <span>계정에 연결된 이메일입니다.</span>
          </article>
          <article class="launch-card">
            <span class="launch-kicker">닉네임</span>
            <strong id="username">사용자</strong>
            <span>커뮤니티에서 보이는 이름입니다.</span>
          </article>
          <article class="launch-card">
            <span class="launch-kicker">상태</span>
            <strong id="status">온라인</strong>
            <span>간단한 상태 메시지를 보여줍니다.</span>
          </article>
          <article class="launch-card">
            <span class="launch-kicker">작성 글 수</span>
            <strong id="posts">0</strong>
            <span>내가 작성한 게시글의 총 개수입니다.</span>
          </article>
        </div>

        <div class="panel-actions profile-actions">
          <button type="button" onclick="openModal()">프로필 수정</button>
          <button type="button" onclick="goHome()">돌아가기</button>
        </div>

        <div class="panel">
          <h2>작성한 글</h2>
          <div id="userPosts" class="post-list"></div>
        </div>

        <div id="profileModal" class="panel" style="display:none; margin-top:16px;">
          <h2>프로필 수정</h2>
          <div class="field">
            <label for="editName">닉네임</label>
            <input id="editName" placeholder="새 닉네임">
          </div>
          <div class="field">
            <label for="editStatus">상태 메시지</label>
            <input id="editStatus" placeholder="예: 지금 오목 전장 중">
          </div>
          <div class="actions">
            <button type="button" onclick="saveProfile()">저장</button>
            <button type="button" class="btn btn-secondary" onclick="closeModal()">취소</button>
          </div>
          <div class="panel-actions">
            <button type="button" onclick="closeModal()">닫기</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    window.openModal = () => {
      const modal = document.getElementById("profileModal");
      if (modal) modal.style.display = "block";
    };
    window.closeModal = () => {
      const modal = document.getElementById("profileModal");
      if (modal) modal.style.display = "none";
    };
  </script>
  <script type="module" src="./js/auth.js"></script>
  <script type="module" src="./js/profile.js"></script>
</body>
</html>
