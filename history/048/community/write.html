<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>글쓰기</title>
  <link rel="stylesheet" href="css/discord.css">
</head>
<body class="app">
  <div class="layout">
    <aside class="sidebar">
      <section class="panel">
        <h2 class="logo"><a class="logo-link" href="../index.html">BlockRail</a></h2>
        <p class="panel-hint">커뮤니티에 새 글을 올리는 화면입니다.</p>
      </section>

      <section class="panel">
        <h2>바로 가기</h2>
        <div class="filter-list">
          <button class="download-link" onclick="goHome()">커뮤니티 홈</button>
          <a class="download-link" href="./my-posts.html">내 글 보기</a>
          <a class="download-link" href="./profile.html">프로필</a>
        </div>
      </section>
    </aside>

    <main class="main">
      <section class="card write-card">
        <p class="eyebrow">BlockRail Community</p>
        <h1>새 글 쓰기</h1>
        <p class="home-copy">제목과 내용을 입력하고 작성 완료를 누르면 커뮤니티에 올라갑니다.</p>

        <div class="form-grid">
          <div class="field">
            <label for="title">제목</label>
            <input id="title" placeholder="글 제목">
          </div>
          <div class="field">
            <label for="content">내용</label>
            <textarea id="content" rows="12" placeholder="내용을 입력하세요"></textarea>
          </div>
        </div>

        <div class="actions">
          <button onclick="writePost()">작성 완료</button>
          <button class="btn btn-secondary" onclick="goHome()">취소</button>
        </div>

        <div id="status" class="panel-hint"></div>
      </section>
    </main>
  </div>

  <script type="module" src="./js/auth.js"></script>
  <script type="module" src="./js/write.js"></script>
</body>
</html>
