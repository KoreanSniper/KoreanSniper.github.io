<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시글</title>
  <link rel="stylesheet" href="css/discord.css">
</head>
<body class="app">
  <div class="layout">
    <aside class="sidebar">
      <section class="panel">
        <h2 class="logo"><a class="logo-link" href="../index.html">BlockRail</a></h2>
        <p class="panel-hint">게시글을 읽고, 반응하고, 댓글을 남길 수 있는 상세 화면입니다.</p>
      </section>

      <section class="panel">
        <h2>바로 가기</h2>
        <div class="filter-list">
          <a class="download-link" href="./index.html">커뮤니티 홈</a>
          <a class="download-link" href="./my-posts.html">내 글 보기</a>
          <a class="download-link" href="./profile.html">프로필</a>
        </div>
      </section>
    </aside>

    <main class="main">
      <section class="card post">
        <p class="eyebrow">BlockRail Community</p>
        <h1 id="title">제목을 불러오는 중입니다</h1>
        <p class="actions">작성자 <span id="author">-</span></p>
        <p id="content" class="home-copy"></p>

        <div class="actions">
          좋아요 <span id="likes">0</span>
          싫어요 <span id="dislikes">0</span>
        </div>

        <div class="panel-actions">
          <button id="likeBtn" type="button">좋아요</button>
          <button id="dislikeBtn" type="button">싫어요</button>
          <button id="reportBtn" type="button">신고</button>
          <button id="deleteBtn" type="button">삭제</button>
          <button id="editBtn" type="button" style="display:none;">수정</button>
        </div>

        <div class="panel">
          <h2>댓글</h2>
          <div class="field">
            <textarea id="comment" rows="5" placeholder="댓글을 입력하세요"></textarea>
          </div>
          <div class="actions">
            <button id="commentBtn" type="button">댓글 쓰기</button>
          </div>
          <div id="comments" class="post-list"></div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="./js/auth.js"></script>
  <script type="module" src="./js/post.js"></script>
</body>
</html>
