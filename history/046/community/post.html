<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Post</title>
  <link rel="stylesheet" href="./css/discord.css">
</head>

<body>

<div class="container">

  <!-- 🔥 게시글 -->
  <div class="card post">
    <h1 id="title">로딩중...</h1>

    <!-- 작성자 -->
    <p style="color:#949ba4; font-size:13px;">
      작성자: <span id="author">로딩중...</span>
    </p>

    <p id="content"></p>

    <div class="actions">
      👍 <span id="likes">0</span>
      👎 <span id="dislikes">0</span>
    </div>

    <div class="btns">

      <button onclick="location.href = './index.html'">← 뒤로가기</button>

      <button id="likeBtn">좋아요</button>
      <button id="dislikeBtn">싫어요</button>
      <button id="reportBtn">신고</button>

      <!-- 🔥 수정 버튼 -->
      <button id="editBtn" style="display:none;">✏️ 수정</button>

      <button id="deleteBtn">삭제</button>

    </div>
  </div>

  <!-- 💬 댓글 입력 -->
  <div class="card comment-box">
    <textarea id="comment" placeholder="댓글 작성..."></textarea>
    <button id="commentBtn">댓글 작성</button>
  </div>

  <!-- 💬 댓글 리스트 -->
  <div id="comments"></div>

</div>

<script type="module" src="./js/post.js"></script>

</body>
</html>
